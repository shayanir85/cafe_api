<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>تغییر رمز عبور | کافی‌شاپ</title>
    <link href="Css/output.css" rel="stylesheet" />
    <link href="Css/newPassword.css" rel="stylesheet" />
    <link href="Css/fontawesome-free-6.7.2-web/css/all.min.css" rel="stylesheet" />
  </head>

  <body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <header class="header">
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <div class="logo-cup">
            <i class="fas fa-mug-hot"></i>
            <div class="steam-wrap">
              <span class="steam-line s1"></span>
              <span class="steam-line s2"></span>
              <span class="steam-line s3"></span>
            </div>
          </div>
          <span class="brand-text">کافی شاپ</span>
        </a>
        <a href="dashboard.html" class="back-link">
          <i class="fas fa-arrow-right"></i>
          <span>بازگشت</span>
        </a>
      </div>
    </header>

    <main class="main-container">
      <div class="reset-wrapper">
        <div class="reset-card">
          <div class="card-header">
            <div class="card-icon">
              <i class="fas fa-key"></i>
            </div>
            <h1 class="card-title">تغییر رمز عبور</h1>
            <p class="card-subtitle">رمز عبور جدید خود را وارد کنید</p>
            <div class="card-divider">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <form id="resetForm" class="reset-form">
            <div id="errorMsg" class="msg-box error hidden">
              <i class="fas fa-exclamation-circle"></i>
              <span id="errorText"></span>
            </div>

            <div id="successMsg" class="msg-box success hidden">
              <i class="fas fa-check-circle"></i>
              <span id="successText">رمز عبور با موفقیت تغییر یافت. در حال انتقال...</span>
            </div>

            <div class="form-group">
              <label for="password">
                <i class="fas fa-lock"></i>
                رمز عبور فعلی
              </label>
              <div class="input-wrap">
                <input
                  id="password"
                  type="password"
                  placeholder="رمز عبور فعلی خود را وارد کنید"
                  autocomplete="current-password"
                  required
                />
                <i class="fas fa-key input-icon"></i>
                <button type="button" class="toggle-password" id="togglePassword">
                  <i id="eyePassword" class="fas fa-eye-slash"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="newPassword">
                <i class="fas fa-lock"></i>
                رمز عبور جدید
              </label>
              <div class="input-wrap">
                <input
                  id="newPassword"
                  type="password"
                  placeholder="رمز عبور جدید خود را وارد کنید"
                  autocomplete="new-password"
                  required
                />
                <i class="fas fa-key input-icon"></i>
                <button type="button" class="toggle-password" id="toggleNewPassword">
                  <i id="eyeNewPassword" class="fas fa-eye-slash"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="newPassword_confirmation">
                <i class="fas fa-check"></i>
                تایید رمز عبور جدید
              </label>
              <div class="input-wrap">
                <input
                  id="newPassword_confirmation"
                  type="password"
                  placeholder="رمز عبور جدید را مجدداً وارد کنید"
                  autocomplete="new-password"
                  required
                />
                <i class="fas fa-check-circle input-icon"></i>
                <button type="button" class="toggle-password" id="toggleConfirmPassword">
                  <i id="eyeConfirmPassword" class="fas fa-eye-slash"></i>
                </button>
              </div>
            </div>

            <div class="password-strength hidden" id="passwordStrength">
              <div class="strength-bar">
                <div class="strength-level" id="strengthLevel"></div>
              </div>
              <span class="strength-text" id="strengthText">ضعیف</span>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              <span id="btnText">تغییر رمز عبور</span>
              <i class="fas fa-save"></i>
              <span id="btnLoading" class="hidden">
                <i class="fas fa-spinner fa-spin"></i>
              </span>
            </button>

          </form>
        </div>
      </div>
    </main>

    <script src="Js/newPassword.js" type="module"></script>
  </body>
</html>
