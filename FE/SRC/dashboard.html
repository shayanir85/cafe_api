<!doctype html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>پنل مدیریت | داشبورد حرفه‌ای</title>
        <link href="Css/output.css" rel="stylesheet">
        <link href="Css/dashboard.css" rel="stylesheet">
        <link href="Css/fontawesome-free-6.7.2-web/css/all.min.css" rel="stylesheet">
    </head>

    <body>
        <aside class="fixed right-0 top-0 h-full z-50" id="Sidebar">
            <div class="h-full flex">
                <div
                    class="bg-gradient-to-b from-slate-900 via-blue-900 to-slate-900 w-16 flex flex-col items-center py-6 space-y-6 shadow-2xl">
                    <button id="BtnToggleMenu" class="rail-icon" aria-label="منو اصلی">
                        <div class="menu-icon">
                            <span class="menu-icon-line top"></span>
                            <span class="menu-icon-line middle"></span>
                            <span class="menu-icon-line bottom"></span>
                        </div>
                    </button>

                    <div class="flex flex-col items-center gap-4">
                        <button class="rail-icon" onclick="location.href='newPassword.html'"
                            aria-label="تغییر رمز عبور">
                            <i class="fa-solid fa-key"></i>
                        </button>

                        <button id="AdminRailBtn" class="rail-icon" onclick="location.href='adminsManagement.html'"
                            aria-label="مدیریت ادمین ها">
                            <i class="fa-solid fa-users-gear"></i>
                        </button>

                        <button class="rail-icon" onclick="location.href='menuManagement.html'" aria-label="مدیریت منو">
                            <i class="fa-solid fa-utensils"></i>
                            <span class="notification-dot"></span>
                        </button>

                        <button class="rail-icon" onclick="location.href='addToMenu.html'"
                            aria-label="اضافه کردن به منو">
                            <i class="fa-solid fa-plus-circle"></i>
                        </button>
                    </div>

                    <div class="flex-1"></div>

                    <button class="rail-icon" id="settingsRailBtn" aria-label="تنظیمات ظاهری">
                        <i class="fa-solid fa-sliders-h"></i>
                    </button>

                    <button id="LogoutIconBtn" class="rail-icon text-red-400 hover:text-red-500"
                        aria-label="خروج از حساب کاربری">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>

                    <div class="relative">
                        <div
                            class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg ring-2 ring-white/20">
                            <span class="text-sm" id="UserAvatar">AD</span>
                        </div>
                        <span
                            class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-slate-900"></span>
                    </div>
                </div>

                <div id="MenuItems"
                    class="sidebar-glass w-64 shadow-2xl overflow-y-auto transition-all duration-300 flex flex-col h-full custom-scroll menu-closed"
                    style="width: 0; opacity: 0; visibility: hidden; padding: 0;">
                    <div class="p-6 border-b border-gray-100 sticky top-0 z-10">
                        <h2 class="text-xl font-bold text-blue-500 tracking-tight">پنل مدیریت</h2>
                        <p class="text-xs text-white mt-1.5" id="UserStatusText">پنل مدیریت حرفه‌ای</p>
                        <div id="LoggedInUserInfo" class="user-info mt-3 hidden">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z">
                                    </path>
                                </svg>
                                <span class="text-xs text-gray-600" id="LoggedInUserName"></span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1" id="LoggedInUserRole"></div>
                        </div>
                    </div>

                    <nav class="py-6 flex-1 space-y-1">
                        <div class="px-3">
                            <button id="DashboardMainBtn"
                                class="sidebar-item w-full flex items-center justify-between px-4 py-2.5 text-gray-700 hover:text-blue-600 transition-all duration-200 group">
                                <div class="flex items-center">
                                    <svg class="w-5 h-5 ml-3 text-gray-400 group-hover:text-blue-500 transition-colors"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                                        </path>
                                    </svg>
                                    <span class="font-medium text-sm">داشبورد</span>
                                </div>
                                <div id="DashboardArrowWrapper"
                                    class="p-1 hover:bg-gray-100 rounded-lg transition-colors">
                                    <svg id="DashboardArrow"
                                        class="w-4 h-4 transition-transform duration-300 text-gray-400" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </button>

                            <div id="DashboardSubmenu"
                                class="hidden mr-8 mt-1 space-y-0.5 border-r-2 border-gray-100 pr-3">
                                <a href="ordersManagement.html"
                                    class="dashboard-subitem flex items-center px-3 py-2 text-sm text-gray-600 hover:text-blue-600 transition-all group">مدیریت
                                    سفارشات</a>
                                <a href="adminsManagement.html"
                                    class="dashboard-subitem flex items-center px-3 py-2 text-sm text-gray-600 hover:text-blue-600 transition-all group"
                                    id="AdminManagementSubmenu">مدیریت ادمین ها</a>
                                <a href="addToMenu.html"
                                    class="dashboard-subitem flex items-center px-3 py-2 text-sm text-gray-600 hover:text-blue-600 transition-all group">اضافه
                                    کردن به منو</a>
                            </div>
                        </div>

                        <div class="px-3 mt-1">
                            <button id="SettingsBtn"
                                class="sidebar-item w-full flex items-center px-4 py-2.5 text-gray-700 hover:text-blue-600 transition-all duration-200 group">
                                <svg class="w-5 h-5 ml-3 text-gray-400 group-hover:text-blue-500 transition-colors"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                <span class="font-medium text-sm">تنظیمات ظاهری</span>
                            </button>
                        </div>
                    </nav>

                    <button id="LogoutMenuBtn"
                        class="w-full flex items-center justify-center gap-3 px-4 py-2.5 mb-2 text-red-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all duration-200 mt-4">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span class="font-medium text-base">خروج از حساب کاربری</span>
                    </button>
                </div>
            </div>
        </aside>

        <main id="MainBody" class="mr-16 p-6 lg:p-8 transition-all duration-300">
            <div class="cards-row">
                <a href="addToMenu.html" class="block card-modern h-full">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <div class="card-icon bg-amber-300">
                                <svg class="text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                                </svg>
                            </div>
                            <div class="card-stats">
                                <span class="card-badge bg-amber-500 pulse-new">جدید</span>
                            </div>
                        </div>
                        <h3 class="card-title">اضافه کردن به منو</h3>
                        <p class="card-description">افزودن آیتم‌های جدید به منوی رستوران یا فروشگاه</p>
                        <div class="card-footer">
                            <span class="card-badge bg-amber-500">افزودن آیتم</span>
                            <svg class="card-arrow text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </div>
                    </div>
                </a>

                <a href="adminsManagement.html" class="block card-modern h-full" id="AdminManagementCard">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <div class="card-icon bg-purple-300">
                                <svg class="text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                                    </path>
                                </svg>
                            </div>
                            <div class="card-stats">
                                <div class="card-value">۸</div>
                                <div class="card-label">ادمین فعال</div>
                            </div>
                        </div>
                        <h3 class="card-title">مدیریت ادمین ها</h3>
                        <p class="card-description">مدیریت دسترسی و سطح اختیارات کاربران ادمین</p>
                        <div class="card-footer">
                            <span class="card-badge bg-purple-500">۳ آنلاین</span>
                            <svg class="card-arrow text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </div>
                    </div>
                </a>
            </div>

            <div class="iframe-wrapper">
                <h3 class="iframe-title">پیش نمایش</h3>
                <iframe src="index.html" title="پیش نمایش منو"></iframe>
            </div>
        </main>

        <div id="SettingsModal"
            class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-all duration-300">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md mx-4 transform transition-all scale-95 opacity-0"
                id="ModalContent">
                <div class="border-b border-gray-100 dark:border-gray-700 p-6 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-gray-900">تنظیمات ظاهری</h3>
                    <button id="CloseModalBtn"
                        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-6">
                    <div>
                        <label class="block text-gray-700 dark:text-gray-500 font-medium mb-3 text-sm">اندازه
                            فونت</label>
                        <div class="flex gap-2">
                            <button
                                class="font-btn flex-1 px-3 py-2 dark:bg-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-900 hover:text-blue-600 dark:hover:text-blue-400 transition-all text-sm font-medium border border-gray-200 dark:border-gray-100"
                                data-font="small">کوچک</button>
                            <button
                                class="font-btn flex-1 px-3 py-2 dark:bg-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-900 hover:text-blue-600 dark:hover:text-blue-400 transition-all text-sm font-medium border border-gray-200 dark:border-gray-100"
                                data-font="normal">متوسط</button>
                            <button
                                class="font-btn flex-1 px-3 py-2 bg-gray-500 dark:bg-gray-300 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-900 hover:text-blue-600 dark:hover:text-blue-400 transition-all text-sm font-medium border border-gray-200 dark:border-gray-100"
                                data-font="large">بزرگ</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 dark:text-gray-500 font-medium mb-3 text-sm">حالت
                            نمایش</label>
                        <div class="flex gap-2">
                            <button id="LightModeBtn"
                                class="flex-1 px-3 py-2.5 rounded-xl transition-all text-sm font-medium border border-gray-300 dark:border-gray-600"><i
                                    class="fa-solid fa-sun ml-2"></i> روشن</button>
                            <button id="DarkModeBtn"
                                class="flex-1 px-3 py-2.5 rounded-xl transition-all text-sm font-medium border border-gray-300 dark:border-gray-600"><i
                                    class="fa-solid fa-moon ml-2"></i> تاریک</button>
                        </div>
                    </div>
                </div>
                <div class="border-t border-gray-300 p-6 flex justify-center">
                    <button id="CancelSettingsBtn"
                        class="px-8 py-3 dark:bg-gray-900 text-gray-200 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition-all text-base font-medium cursor-pointer">بستن</button>
                </div>
            </div>
        </div>

        <script src="Js/dashboard.js" type="module"></script>
    </body>

</html>
