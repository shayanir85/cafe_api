<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ورود به پنل مدیریت | کافی‌شاپ</title>
    <link href="Css/output.css" rel="stylesheet" />
    <link href="Css/login.css" rel="stylesheet" />
    <link
      href="Css/fontawesome-free-6.7.2-web/css/all.min.css"
      rel="stylesheet" />
  </head>

  <body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <header class="header">
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <div class="logo-cup">
            <i class="fas fa-mug-hot"></i>
            <div class="steam-wrap">
              <span class="steam-line s1"></span>
              <span class="steam-line s2"></span>
              <span class="steam-line s3"></span>
            </div>
          </div>
          <span class="brand-text">کافی شاپ</span>
        </a>
        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-right"></i>
          <span>بازگشت</span>
        </a>
      </div>
    </header>

    <main class="main-container">
      <div class="login-wrapper">
        <div class="login-card">
          <div class="card-header">
            <div class="card-icon">
              <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="card-title">ورود به پنل مدیریت</h1>
            <p class="card-subtitle">لطفاً اطلاعات خود را وارد کنید</p>
            <div class="card-divider">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <form id="loginForm" class="login-form">
            <div id="errorMsg" class="msg-box error hidden">
              <i class="fas fa-exclamation-circle"></i>
              <span id="errorText"></span>
            </div>
            <div id="loadingMsg" class="msg-box loading hidden">
              <i class="fas fa-spinner fa-spin"></i>
              <span id="loadingText">در حال ورود...</span>
            </div>

            <div class="form-group">
              <label for="email">
                <i class="fas fa-envelope"></i>
                آدرس ایمیل
              </label>
              <div class="input-wrap">
                <input
                  id="email"
                  type="email"
                  placeholder="example@email.com"
                  autocomplete="email"
                  required />
                <i class="fas fa-user input-icon"></i>
              </div>
            </div>

            <div class="form-group">
              <label for="password">
                <i class="fas fa-lock"></i>
                رمز عبور
              </label>
              <div class="input-wrap">
                <input
                  id="password"
                  type="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required />
                <i class="fas fa-key input-icon"></i>
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePasswordBtn">
                  <i id="eyeIcon" class="fas fa-eye-slash"></i>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" id="remember" />
                <span class="checkmark"></span>
                <span class="checkbox-text">مرا به خاطر بسپار</span>
              </label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              <span id="btnText">ورود به پنل مدیریت</span>
              <i class="fas fa-mug-hot"></i>
              <span id="btnLoading" class="hidden">
                <i class="fas fa-spinner fa-spin"></i>
              </span>
            </button>
          </form>
        </div>
      </div>
    </main>

    <script src="Js/login.js" type="module"></script>
  </body>
</html>
